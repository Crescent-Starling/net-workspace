<!DOCTYPE html>
<html>
<head><title>模拟招聘列表页 - 测试用</title>
<style>
.job-card { border: 1px solid #eee; padding: 12px; margin: 8px; }
.job-card h3 { margin: 0; }
.job-card .company { color: #666; }
.job-card .salary { color: #f60; font-weight: bold; }
.job-card .city { color: #999; font-size: 14px; }
.pagination { margin: 20px; }
.pagination a { padding: 4px 12px; margin: 0 4px; border: 1px solid #ddd; }
</style>
</head>
<body>
<div class="job-list">
  <div class="job-card">
    <h3 class="title">数据分析师</h3>
    <span class="company">字节跳动</span>
    <span class="city">北京</span>
    <span class="salary">15K-30K</span>
    <a href="https://jobs.example.com/job/1001" class="link">查看详情</a>
  </div>
  <div class="job-card">
    <h3 class="title">高级数据分析师</h3>
    <span class="company">阿里巴巴</span>
    <span class="city">杭州</span>
    <span class="salary">20K-40K</span>
    <a href="https://jobs.example.com/job/1002" class="link">查看详情</a>
  </div>
  <div class="job-card">
    <h3 class="title">商业分析师</h3>
    <span class="company">腾讯</span>
    <span class="city">深圳</span>
    <span class="salary">18K-35K</span>
    <a href="https://jobs.example.com/job/1003" class="link">查看详情</a>
  </div>
  <div class="job-card">
    <h3 class="title">数据科学家</h3>
    <span class="company">美团</span>
    <span class="city">北京</span>
    <span class="salary">25K-50K</span>
    <a href="https://jobs.example.com/job/1004" class="link">查看详情</a>
  </div>
  <div class="job-card">
    <h3 class="title">BI 工程师</h3>
    <span class="company">京东</span>
    <span class="city">北京</span>
    <span class="salary">15K-25K</span>
    <a href="https://jobs.example.com/job/1005" class="link">查看详情</a>
  </div>
</div>
</body>
</html>
